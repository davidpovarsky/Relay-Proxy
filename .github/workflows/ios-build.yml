name: iOS Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned device app
        run: |
          set -euo pipefail

          xcodebuild \
            -project RelayProxy.xcodeproj \
            -scheme RelayProxy \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          APP_PATH="$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -type d | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found."
            exit 1
          fi

          echo "Packaging app: $APP_PATH"
          rm -rf Payload RelayProxy-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry RelayProxy-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RelayProxy-unsigned-ipa
          path: RelayProxy-unsigned.ipa
          if-no-files-found: error
